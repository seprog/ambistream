worker_processes auto;
rtmp_auto_push on;

events {}

rtmp {
  server {
    listen 1935;
    listen [::]:1935 ipv6only=on;

    application ambistream {
      live on;
      record off;

      exec /opt/lifx-ambilight/venv/bin/python3 /opt/lifx-ambilight/main.py --stream rtmp://localhost:1935/$app/$name;
    }
  }
}
